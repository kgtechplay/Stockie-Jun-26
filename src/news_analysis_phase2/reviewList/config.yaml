agent_name: reviewList
version: 1.0

quality_thresholds:
  approve: 0.75
  approve_with_changes: 0.50
  reject_and_rerun: 0.0

trade_signal_generation:
  enabled: true
  minimum_confidence_for_signal: 0.50
  minimum_trade_score_for_approved: 0.60
  minimum_trade_score_for_monitor_only: 0.40
  allowed_review_actions_for_signal:
    - keep
    - modify
  disallowed_review_actions_for_signal:
    - downgrade
    - remove
  allowed_signal_statuses:
    - approved
    - monitor_only
  excluded_signal_directions:
    - mixed
    - uncertain
  excluded_timeline_buckets:
    - uncertain

score_weights:
  directness:
    direct: 1.0
    indirect: 0.65
    second_order: 0.35
  sensitivity:
    very_high: 1.0
    high: 0.8
    medium: 0.5
    low: 0.25
  timeline:
    same_day: 1.0
    1_3_days: 0.85
    1_4_weeks: 0.55
    1_6_months: 0.30
    6_months_plus: 0.15
    uncertain: 0.0

suggested_max_holding_days:
  same_day: 1
  1_3_days: 3
  1_4_weeks: 20
  1_6_months: 90
  6_months_plus: 120
  uncertain:

entry_rules:
  market_timezone: Asia/Kolkata
  market_open_time: "09:15"
  market_close_time: "15:30"
  default_entry: next_tradable_open_after_processed_at
  allow_intraday_entry: true
  intraday_entry_delay_minutes: 15
