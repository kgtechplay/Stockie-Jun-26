agent_name: dailyNews
version: 1.0

confidence_thresholds:
  high: 0.75
  medium: 0.50
  low: 0.25

allowed_price_directions:
  - up
  - down
  - mixed
  - uncertain

commodity_groups:
  energy:
    - crude_oil
    - brent_crude
    - wti_crude
    - natural_gas
    - lng
    - coal
    - gasoline
    - diesel
    - naphtha
    - aviation_turbine_fuel
  metals:
    - copper
    - aluminium
    - zinc
    - nickel
    - steel
    - iron_ore
    - lithium
    - cobalt
  agri:
    - wheat
    - rice
    - sugar
    - cotton
    - soybean
    - edible_oil
    - corn
  chemicals:
    - urea
    - ammonia
    - methanol
    - polymers
    - pvc
    - polyethylene
    - polypropylene
  precious_metals:
    - gold
    - silver

impact_mechanisms:
  - supply_shock
  - demand_shock
  - logistics_disruption
  - policy_regulation
  - geopolitical_risk
  - weather_risk
  - currency_effect
  - inventory_effect
  - substitution_effect
  - speculative_positioning

rules:
  max_commodities_per_news: 8
  require_article_evidence: true
  allow_indirect_commodity_mapping: true
  mark_low_confidence_if_chain_longer_than_two_steps: true
