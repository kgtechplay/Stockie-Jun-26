version: 1
labels:
  strong_min: 80
  moderate_min: 65
adjustment_sets:
  call_headroom:
    - column: resistance_distance_10d
      lt_regime_threshold_multiple: 1.0
      add: -14
    - column: resistance_distance_10d
      lt_regime_threshold_multiple: 1.5
      add: -7
    - column: resistance_distance_10d
      gte_regime_threshold_multiple: 3.0
      add: 5
  put_room:
    - column: support_distance_10d
      lt_regime_threshold_multiple: 1.0
      add: -14
    - column: support_distance_10d
      lt_regime_threshold_multiple: 1.5
      add: -7
    - column: support_distance_10d
      gte_regime_threshold_multiple: 3.0
      add: 5
  expansion:
    - column: bb_width
      gte: 0.065
      add: 5
    - column: bb_width
      gte: 0.055
      add: 3
    - column: bb_width
      lt: 0.04
      add: -5
  high_vix:
    - column: vix_close
      gte: 16
      add: 4
    - column: vix_close
      lt: 12
      add: -6
  calm_low_vol:
    - column: vix_close
      lt: 13
      add: 3
  call_rebound_confirmation:
    - column: ret_5d
      gt_column: ret_10d
      add: 4
    - column: rsi14
      lt: 30
      add: 3
  put_momentum_confirmation:
    - column: ret_3d
      lte: -0.005
      add: 4
    - column: ret_10d
      lte: -0.01
      add: 3
  overbought_exhaustion:
    - column: rsi14
      gte: 70
      add: 4
    - column: rsi5
      gte: 85
      add: 3
